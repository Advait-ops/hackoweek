<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Plate</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia,serif}
body{background:#0b0b0b;color:#fff}

header{background:#000;color:#d4af37;text-align:center;padding:20px;font-size:28px;letter-spacing:3px;border-bottom:1px solid rgba(212,175,55,0.3)}

.container{display:grid;grid-template-columns:2fr 1fr;gap:20px;padding:20px}

.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}

.card{background:#111;border:1px solid rgba(212,175,55,0.2);border-radius:15px;padding:10px;text-align:center}
.card img{width:100%;height:150px;object-fit:cover;border-radius:10px}
.price{color:#d4af37;margin:8px 0}
button{padding:8px 12px;border:none;border-radius:20px;cursor:pointer}
.add{background:#d4af37;color:#000}

.cart{background:#000;border-left:1px solid rgba(212,175,55,0.2);padding:15px;height:90vh;overflow:auto}
.cart h2{text-align:center;color:#d4af37;margin-bottom:10px}
.cart-item{display:flex;justify-content:space-between;margin:5px 0}
.total{margin-top:10px;font-weight:bold}
.checkout{width:100%;margin-top:10px;background:#d4af37;color:#000}

footer{text-align:center;padding:15px;background:#000;border-top:1px solid rgba(212,175,55,0.3)}
</style>
</head>

<body>

<header>Golden Plate</header>

<div class="container">

<div class="menu">

<div class="card"><img src="tv-with-city-skyline-illuminated-dusk-with-traffic-motion-generative-ai.jpg"><h3>Smart TV</h3><p class="price">₹45,000</p><button class="add" onclick="addItem('Smart TV',45000)">Add</button></div>
<div class="card"><img src="6768d33b-e2a1-4100-b1a6-b3a74dcfc530.jpg"><h3>iPhone 15</h3><p class="price">₹80,000</p><button class="add" onclick="addItem('iPhone 15',80000)">Add</button></div>
<div class="card"><img src="pexels-userpascal-32967534.jpg"><h3>PS5 Console</h3><p class="price">₹50,000</p><button class="add" onclick="addItem('PS5 Console',50000)">Add</button></div>
<div class="card"><img src="pexels-darina-belonogova-8003992.jpg"><h3>Laptop</h3><p class="price">₹65,000</p><button class="add" onclick="addItem('Laptop',65000)">Add</button></div>
<div class="card"><img src="pexels-oleksandr-plakhota-1270583835-35235991.jpg"><h3>Bluetooth Headphones</h3><p class="price">₹3,000</p><button class="add" onclick="addItem('Bluetooth Headphones',3000)">Add</button></div>
<div class="card"><img src="pexels-pratik-prasad-3736245-11700618.jpg"><h3>Smart Watch</h3><p class="price">₹5,000</p><button class="add" onclick="addItem('Smart Watch',5000)">Add</button></div>

</div>

<div class="cart">
<h2>Cart</h2>
<div id="cartItems"></div>
<div class="total">Total: ₹<span id="total">0</span></div>
<button class="checkout" onclick="checkout()">Checkout</button>
</div>

</div>

<footer>© 2026 Golden Plate</footer>

<script>
let cart={};

function addItem(name,price){
 if(!cart[name]) cart[name]={price:price,qty:0};
 cart[name].qty++;
 renderCart();
}

function renderCart(){
 let html="";
 let total=0;
 for(let item in cart){
  let i=cart[item];
  total+=i.price*i.qty;
  html+=`<div class="cart-item">${item} x${i.qty}</div>`;
 }
 document.getElementById("cartItems").innerHTML=html;
 document.getElementById("total").innerText=total;
}

function checkout(){
 if(Object.keys(cart).length===0){alert("Cart is empty");return}
 alert("Order placed successfully!");
 cart={};
 renderCart();
}
</script>

</body>
</html>
